services:
  prometheus:
    image: prom/prometheus:v3.11.2
    container_name: prometheus
    networks:
      - monitoring
    expose:
      - "9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
  
  grafana:
    image: grafana/grafana:v13
    container_name: grafana
    networks:
      - monitoring
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD must be set}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/portfolio.json
      - GF_SERVER_ROOT_URL=https://api.devogel.dev/grafana/
    volumes:
      - grafana-data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./configs/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped


networks:
  monitoring:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data: